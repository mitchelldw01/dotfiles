# General
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on

# Status Bar
set-option -g status-position top
set-option -g status-bg "#1a1b26"
set-option -g status-fg "#c0caf5"
set-option -g status-left ""
set-option -g status-right ""
set-window-option -g window-status-current-style fg=green
set-window-option -g window-status-format "#W"
set-window-option -g window-status-current-format "#W"

# Leader Key
set -g prefix C-a
bind-key -n C-s send-prefix
unbind C-b

# Pane Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
unbind C-b
unbind C-h
unbind C-j
unbind C-k
unbind C-l

# Window Management
bind w kill-window
bind d split-window -h
bind D split-window -v
unbind '"'
unbind %
unbind &

# Window Navigation
bind 1 select-window -t 0
bind 2 select-window -t 1
bind 3 select-window -t 2
bind 4 select-window -t 3
bind 5 select-window -t 4
bind 6 select-window -t 5
bind 7 select-window -t 6
bind 8 select-window -t 7
bind 9 select-window -t 8
bind 0 select-window -t 9
